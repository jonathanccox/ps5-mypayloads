name: Sync Latest PS5Upload Release
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every single day at midnight
  workflow_dispatch: # Gives you a manual button to force-run it whenever you want

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Query Upstream GitHub Release
        id: upstream
        run: |
          # Query GitHub's API for phantomptr's latest release tag and search for an .elf asset filename
          RELEASE_DATA=$(curl -s https://api.github.com/repos/phantomptr/ps5upload/releases/latest)
          
          TAG_NAME=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
          VERSION_NUM=$(echo "$TAG_NAME" | sed 's/v//')
          
          # Isolate the exact .elf asset name (handles variation strings like ps5upload-3.3.26.elf)
          ELF_NAME=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith(".elf")) | .name' | head -n 1)
          
          # If an explicit .elf asset isn't tracked yet, fallback safely to standard format strings
          if [ -z "$ELF_NAME" ] || [ "$ELF_NAME" = "null" ]; then
            ELF_NAME="ps5upload-${VERSION_NUM}.elf"
          fi
          
          DIRECT_URL="https://github.com/phantomptr/ps5upload/releases/download/${TAG_NAME}/${ELF_NAME}"
          
          echo "VER=$TAG_NAME" >> $GITHUB_ENV
          echo "FILENAME=$ELF_NAME" >> $GITHUB_ENV
          echo "URL=$DIRECT_URL" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Overwrite payloads.json
        run: |
          # Use jq targeting a flat array structure (.[0]) to update all 5 parameters seamlessly
          jq --arg file "${{ env.FILENAME }}" \
             --arg url "${{ env.URL }}" \
             --arg date "${{ env.DATE }}" \
             --arg ver "${{ env.VER }}" \
             '.[0].filename = $file | .[0].url = $url | .[0].source_direct = $url | .[0].last_update = $date | .[0].version = $ver' payloads.json > tmp.json && mv tmp.json payloads.json

      - name: Push Automated Changes
        run: |
          git config --global user.name "GitHub Automation Bot"
          git config --global user.email "actions@github.com"
          git add payloads.json
          git commit -m "Sync upstream release: ${{ env.VER }}" || exit 0
          git push
